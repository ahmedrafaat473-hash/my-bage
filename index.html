<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendo</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#f5f7fb;
color:#111;
}

/* الهيدر */
header{
background:#000;
color:white;
text-align:center;
padding:140px 20px;
}

header h1{
font-size:70px;
}

header p{
margin-top:15px;
color:#bbb;
max-width:700px;
margin:auto;
line-height:1.8;
}

/* ⭐ زر واحد فقط */
.btn{
display:inline-block;
margin-top:35px;
padding:18px 45px;
background:#25D366;
color:white;
text-decoration:none;
border-radius:50px;
font-weight:bold;
font-size:18px;
}

/* الأقسام */
section{
padding:70px 20px;
max-width:1000px;
margin:auto;
}

.title{
text-align:center;
font-size:38px;
margin-bottom:40px;
}

/* كروت بسيطة */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 6px 20px rgba(0,0,0,.08);
text-align:center;
}

/* أعمال */
.project img{
width:100%;
border-radius:12px;
}

.project{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 6px 20px rgba(0,0,0,.08);
}

.project p{
padding:12px;
text-align:center;
}

/* footer */
footer{
background:#000;
color:white;
text-align:center;
padding:25px;
}
</style>
</head>

<body>

<header>
<h1>Vendo</h1>
<p>نصمم مواقع احترافية تساعدك تبدأ مشروعك وتكسب عملاء حقيقيين</p>

<!-- ⭐ زر واحد فقط -->
<a class="btn"
href="https://wa.me/201036733858?text=مرحباً، أريد تصميم موقع احترافي لمشروعي"
target="_blank">
تواصل معنا
</a>
</header>

<section>
<h2 class="title">خدماتنا</h2>

<div class="grid">
<div class="card">
<h3>تصميم مواقع</h3>
<p>مواقع حديثة وسريعة</p>
</div>

<div class="card">
<h3>متاجر إلكترونية</h3>
<p>بيع منتجاتك أونلاين</p>
</div>

<div class="card">
<h3>صفحات تسويق</h3>
<p>زيادة العملاء بسرعة</p>
</div>
</div>
</section>

<section>
<h2 class="title">أعمالنا</h2>

<div class="grid">

<div class="project">
<img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?w=800">
<p>موقع شركة</p>
</div>

<div class="project">
<img src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=800">
<p>متجر إلكتروني</p>
</div>

<div class="project">
<img src="https://images.unsplash.com/photo-1522199710521-72d69614c702?w=800">
<p>صفحة هبوط</p>
</div>

</div>
</section>

<footer>
© 2026 Vendo
</footer>

</body>
</html>
